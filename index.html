<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubba Blaze | Freeze-Dried Candy — Coming Soon</title>
    <meta name="description" content="Bubba Blaze — freeze-dried candy that hits different. Crunchy, bold, and bursting with flavor. Coming soon!">
    <meta property="og:title" content="Bubba Blaze | Freeze-Dried Candy">
    <meta property="og:description" content="Crunchy, bold, and bursting with flavor. Coming soon!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bubbablaze.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a73e8 0%, #4fc3f7 25%, #0d47a1 50%, #29b6f6 75%, #6c63ff 100%);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            font-family: 'Nunito', sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating candy shapes */
        .candy {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            pointer-events: none;
        }

        .candy-1 {
            width: 120px;
            height: 120px;
            background: #fff;
            top: 10%;
            left: 5%;
            animation: float 8s ease-in-out infinite;
        }

        .candy-2 {
            width: 80px;
            height: 80px;
            background: #4fc3f7;
            top: 60%;
            right: 8%;
            animation: float 6s ease-in-out infinite 1s;
        }

        .candy-3 {
            width: 60px;
            height: 60px;
            background: #1a73e8;
            bottom: 15%;
            left: 12%;
            animation: float 7s ease-in-out infinite 2s;
        }

        .candy-4 {
            width: 100px;
            height: 100px;
            background: #6c63ff;
            top: 20%;
            right: 15%;
            animation: float 9s ease-in-out infinite 0.5s;
        }

        .candy-5 {
            width: 50px;
            height: 50px;
            background: #fff;
            bottom: 25%;
            right: 25%;
            animation: float 5s ease-in-out infinite 3s;
        }

        .candy-6 {
            width: 70px;
            height: 70px;
            background: #29b6f6;
            top: 5%;
            right: 40%;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: float 7s ease-in-out infinite 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* Star shapes */
        .star {
            position: absolute;
            opacity: 0.2;
            pointer-events: none;
        }

        .star::before {
            content: "\2605";
            font-size: 40px;
            color: #fff;
        }

        .star-1 { top: 30%; left: 20%; animation: twinkle 3s ease-in-out infinite; }
        .star-2 { top: 70%; right: 12%; animation: twinkle 4s ease-in-out infinite 1s; }
        .star-3 { bottom: 10%; left: 40%; animation: twinkle 3.5s ease-in-out infinite 0.5s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(1.2); }
        }

        /* Main content */
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
            max-width: 700px;
        }

        .brand {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            line-height: 1.1;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.15);
            letter-spacing: -0.02em;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .tagline {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            font-weight: 700;
            margin-top: 0.5rem;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.1);
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        .divider {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 2px;
            margin: 1.5rem auto;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both;
        }

        .coming-soon {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 700;
            margin-top: 0.5rem;
            animation: pulse 2.5s ease-in-out infinite, popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .description {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: 600;
            margin-top: 1rem;
            line-height: 1.6;
            opacity: 0.9;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s both;
        }

        .badge {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.6rem 1.8rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s both;
        }

        /* Emoji candy row */
        .candy-row {
            margin-top: 2rem;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            letter-spacing: 0.3em;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s both;
        }
    </style>
</head>
<body>
    <!-- Decorative floating shapes -->
    <div class="candy candy-1"></div>
    <div class="candy candy-2"></div>
    <div class="candy candy-3"></div>
    <div class="candy candy-4"></div>
    <div class="candy candy-5"></div>
    <div class="candy candy-6"></div>
    <div class="star star-1"></div>
    <div class="star star-2"></div>
    <div class="star star-3"></div>

    <main class="container">
        <h1 class="brand">Bubba Blaze</h1>
        <p class="tagline">Freeze-Dried Candy That Hits Different</p>
        <div class="divider"></div>
        <p class="coming-soon">Coming Soon</p>
        <p class="description">
            Crunchy. Bold. Bursting with flavor.<br>
            Get ready for freeze-dried candy done right.
        </p>
        <div class="badge">Stay Tuned for Launch</div>
        <div class="candy-row" aria-hidden="true">
            &#127853; &#127851; &#128293; &#127852; &#127853;
        </div>
    </main>
</body>
</html>
